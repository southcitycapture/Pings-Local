name: Release

# Build signed macOS artifacts and publish a GitHub Release (with the updater's
# latest.json) when a version tag is pushed. The updater endpoint in
# tauri.conf.json points at this repo's latest release:
#   https://github.com/southcitycapture/Pings-Local/releases/latest/download/latest.json
#
# Required repository secrets:
#   TAURI_SIGNING_PRIVATE_KEY           - contents of src-tauri/tauri-update.key
#                                         (must match the pubkey in tauri.conf.json)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  - its password ("" if none)
#
# Apple Developer ID signing + notarization are intentionally NOT wired yet
# (no account). Until they are, the .app is ad-hoc signed and Gatekeeper will
# warn on first launch; the release is created as a draft so it can be reviewed
# before publishing.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust (both macOS targets for the universal build)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Cache cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Pings ${{ github.ref_name }}"
          releaseBody: "Download the .dmg to install. Auto-update will pick up future releases."
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin
