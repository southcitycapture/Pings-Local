<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="theme-color" content="#14b8a6" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="/go/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/go/icon-192.png" />
<link rel="icon" type="image/png" href="/go/icon-192.png" />
<title>Pings Go!</title>
<style>
  /* Pings design tokens (mirrors src/core/tokens.css) */
  :root {
    --ground: #f5f7f6; --panel: #ffffff; --inset: #eef1f0;
    --ink: #17211f; --ink-2: #5b6663; --ink-3: #8a9491;
    --line: #e2e7e5; --accent: #14b8a6; --accent-ink: #0b6b61;
    --amber: #f59e0b; --amber-ink: #92600a;
    --good: #22a06b; --bad: #dc2626;
    --radius: 12px;
    --sat: env(safe-area-inset-top, 0px); --sab: env(safe-area-inset-bottom, 0px);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --ground: #0f1514; --panel: #161d1c; --inset: #1d2523;
      --ink: #e8edec; --ink-2: #9fb0ac; --ink-3: #6d7a77;
      --line: #253030; --accent: #2dd4bf; --accent-ink: #99f6e4;
      --amber: #fbbf24; --amber-ink: #fde68a;
    }
  }
  * { box-sizing: border-box; margin: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    font: 15px/1.45 -apple-system, "Segoe UI", system-ui, sans-serif;
    background: var(--ground); color: var(--ink);
    overscroll-behavior: none;
  }
  [hidden] { display: none !important; }
  button { font: inherit; border: 0; cursor: pointer; background: none; color: inherit; }
  input {
    font: inherit; width: 100%; height: 44px; color: var(--ink);
    background: var(--inset); border: 1px solid var(--line);
    border-radius: 10px; padding: 0 12px;
  }
  input:focus { outline: none; border-color: var(--accent); }

  /* ---- views are full-height flex columns ---- */
  .view { position: fixed; inset: 0; display: flex; flex-direction: column; background: var(--ground); }

  /* ---- sign in ---- */
  #signin { justify-content: center; padding: 24px; }
  .signin-card { width: 100%; max-width: 360px; margin: 0 auto; display: grid; gap: 12px; }
  .logo { width: 72px; height: 72px; border-radius: 18px; margin: 0 auto 6px; display: block; }
  .signin-card h1 { text-align: center; font-size: 22px; font-weight: 700; }
  .signin-card p { text-align: center; color: var(--ink-2); font-size: 13px; margin-bottom: 6px; }
  .cta {
    height: 46px; border-radius: 10px; font-weight: 650;
    background: var(--accent); color: #06302b;
  }
  .cta:active { filter: brightness(0.92); }
  #signin-error { color: var(--bad); font-size: 13px; text-align: center; min-height: 1.2em; }

  /* ---- header ---- */
  header {
    padding: calc(var(--sat) + 10px) 16px 10px; background: var(--panel);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 10px; flex: none;
  }
  .conn { width: 8px; height: 8px; border-radius: 50%; background: var(--ink-3); flex: none; }
  .conn.up { background: var(--good); }
  header .who { min-width: 0; }
  header .who .name { font-weight: 650; font-size: 16px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  header .who .sub { color: var(--ink-3); font-size: 12px; }
  #signout { margin-left: auto; color: var(--ink-3); font-size: 13px; padding: 8px; }

  /* ---- roster ---- */
  #peer-list { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 8px 12px calc(var(--sab) + 16px); }
  .row {
    display: flex; align-items: center; gap: 12px; width: 100%; text-align: left;
    background: var(--panel); border: 1px solid var(--line); border-radius: var(--radius);
    padding: 12px 14px; margin-bottom: 8px; min-height: 64px;
  }
  .row:active { background: var(--inset); }
  .avatar {
    width: 40px; height: 40px; border-radius: 50%; flex: none;
    display: grid; place-items: center; font-weight: 700; font-size: 14px; color: #fff;
  }
  .av-1 { background: #0d9488; } .av-2 { background: #7c3aed; } .av-3 { background: #db2777; }
  .av-4 { background: #ea580c; } .av-5 { background: #2563eb; } .av-6 { background: #65a30d; }
  .row .mid { min-width: 0; flex: 1; }
  .row .name { font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .row .name .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink-3); }
  .row .name .dot.online { background: var(--good); }
  .badge {
    font-size: 10px; font-weight: 700; letter-spacing: 0.04em; color: var(--accent-ink);
    background: color-mix(in srgb, var(--accent) 18%, transparent);
    border-radius: 4px; padding: 1px 5px;
  }
  .row .sub { color: var(--ink-3); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .unread {
    min-width: 20px; height: 20px; border-radius: 10px; padding: 0 6px; flex: none;
    background: var(--accent); color: #06302b; font-size: 12px; font-weight: 700;
    display: grid; place-items: center;
  }
  .ping-btn {
    flex: none; height: 40px; padding: 0 16px; border-radius: 10px; font-weight: 700;
    background: color-mix(in srgb, var(--amber) 22%, transparent); color: var(--amber-ink);
  }
  .ping-btn:active { background: color-mix(in srgb, var(--amber) 38%, transparent); }
  .ping-btn.sent { background: color-mix(in srgb, var(--good) 20%, transparent); color: var(--good); }
  .empty-list { color: var(--ink-3); text-align: center; padding: 48px 24px; }

  /* ---- chat ---- */
  #chat header .back { font-size: 22px; padding: 4px 10px 4px 0; color: var(--accent); }
  #thread { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px 14px 8px; display: flex; flex-direction: column; gap: 6px; }
  .bubble {
    max-width: 78%; padding: 9px 12px; border-radius: 16px; font-size: 15px;
    background: var(--panel); border: 1px solid var(--line);
    align-self: flex-start; border-bottom-left-radius: 6px; word-wrap: break-word;
  }
  .bubble.mine {
    align-self: flex-end; background: var(--accent); color: #06302b;
    border: 0; border-bottom-left-radius: 16px; border-bottom-right-radius: 6px;
  }
  .bubble .meta { font-size: 10px; opacity: 0.65; margin-top: 3px; text-align: right; }
  .composer {
    flex: none; display: flex; gap: 8px; padding: 10px 12px calc(var(--sab) + 10px);
    background: var(--panel); border-top: 1px solid var(--line);
  }
  .composer button {
    flex: none; width: 66px; border-radius: 10px; font-weight: 700;
    background: var(--accent); color: #06302b;
  }

  /* ---- the flash: the soul of the app, on a phone ---- */
  #flash { position: fixed; inset: 0; z-index: 50; pointer-events: none; display: grid; place-items: center; }
  #flash .edge {
    position: absolute; inset: 0;
    box-shadow: inset 0 0 0 10px var(--flash-color, #14b8a6), inset 0 0 64px 22px color-mix(in srgb, var(--flash-color, #14b8a6) 55%, transparent);
    animation: edge-pulse 1.15s ease-out forwards;
  }
  @keyframes edge-pulse {
    0% { opacity: 0; } 12% { opacity: 1; } 55% { opacity: 0.9; } 100% { opacity: 0; }
  }
  #flash .card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
    padding: 18px 26px; text-align: center; box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    animation: card-pop 1.6s ease-out forwards;
  }
  @keyframes card-pop {
    0% { opacity: 0; transform: scale(0.86); } 10% { opacity: 1; transform: scale(1); }
    80% { opacity: 1; } 100% { opacity: 0; }
  }
  #flash .from { font-size: 19px; font-weight: 700; }
  #flash .msg { color: var(--ink-2); font-size: 14px; margin-top: 3px; }

  /* toast for in-app notices */
  #toast {
    position: fixed; left: 50%; transform: translateX(-50%);
    bottom: calc(var(--sab) + 18px); z-index: 60;
    background: var(--ink); color: var(--ground); font-size: 13px; font-weight: 600;
    border-radius: 20px; padding: 8px 16px; opacity: 0; transition: opacity 0.25s;
    pointer-events: none; max-width: 86vw; text-align: center;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<section id="signin" class="view" hidden>
  <div class="signin-card">
    <img class="logo" src="/go/icon-192.png" alt="" />
    <h1>Pings Go!</h1>
    <p>Join your team. Your phone becomes pingable.</p>
    <input id="in-name" type="text" placeholder="Your name" autocomplete="name" />
    <input id="in-key" type="password" placeholder="Team key" autocomplete="off" />
    <button id="in-go" class="cta">Join the team</button>
    <div id="signin-error"></div>
  </div>
</section>

<section id="roster" class="view" hidden>
  <header>
    <span class="conn" id="conn-dot"></span>
    <div class="who">
      <div class="name" id="self-name"></div>
      <div class="sub" id="self-sub">connecting…</div>
    </div>
    <button id="signout">Sign out</button>
  </header>
  <div id="peer-list"></div>
</section>

<section id="chat" class="view" hidden>
  <header>
    <button class="back" id="chat-back">‹</button>
    <div class="who">
      <div class="name" id="chat-name"></div>
      <div class="sub" id="chat-sub"></div>
    </div>
  </header>
  <div id="thread"></div>
  <div class="composer">
    <input id="chat-input" type="text" placeholder="Message" autocomplete="off" enterkeyhint="send" />
    <button id="chat-send">Send</button>
  </div>
</section>

<div id="flash" hidden><div class="edge"></div><div class="card"><div class="from"></div><div class="msg"></div></div></div>
<div id="toast"></div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
// Escapes quotes too — esc() output lands inside double-quoted attributes
// (data-open="…"), and peer names/ids come from other clients.
const esc = (t) =>
  String(t ?? "").replace(/[&<>"']/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

// ---------------------------------------------------------------- identity
const store = {
  get token() { return localStorage.getItem("go-token") || ""; },
  set token(v) { v ? localStorage.setItem("go-token", v) : localStorage.removeItem("go-token"); },
  get peerId() {
    let id = localStorage.getItem("go-peer-id");
    if (!id) { id = crypto.randomUUID(); localStorage.setItem("go-peer-id", id); }
    return id;
  },
  get name() { return localStorage.getItem("go-name") || ""; },
  set name(v) { localStorage.setItem("go-name", v); },
};
// Our pseudo-address: unique per device, never routable — everything to and
// from a phone rides the relay, which is exactly the desktops' fallback path.
const myAddr = () => "go-" + store.peerId.slice(0, 8);

// ---------------------------------------------------------------- state
let peers = [];            // roster from the server
let ws = null;             // relay socket
let wsUp = false;
let currentChat = null;    // peerId of the open thread
const threads = new Map(); // peerId -> [{mine, message, timestamp, id, delivered}]
const unread = new Map();  // peerId -> count
let timers = [];

// ---------------------------------------------------------------- audio + haptics
let audioCtx = null;
function tone(freq, type, dur, gain) {
  try {
    audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
    const osc = audioCtx.createOscillator(), g = audioCtx.createGain();
    osc.type = type; osc.frequency.value = freq; g.gain.value = 0;
    osc.connect(g); g.connect(audioCtx.destination);
    const now = audioCtx.currentTime;
    g.gain.linearRampToValueAtTime(gain, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    osc.start(now); osc.stop(now + dur);
  } catch { /* audio may need a user gesture first */ }
}
const sounds = {
  chime: () => tone(1140, "sine", 0.16, 0.25),
  bubble: () => tone(720, "sine", 0.11, 0.18),
  tap: () => tone(1350, "square", 0.05, 0.16),
};
const buzz = (pattern) => { try { navigator.vibrate?.(pattern); } catch {} };

// ---------------------------------------------------------------- api
async function api(path, options = {}) {
  const res = await fetch(path, {
    ...options,
    headers: {
      Authorization: "Bearer " + (options.key || store.token),
      "Content-Type": "application/json",
      ...(options.headers || {}),
    },
  });
  if (res.status === 401) throw new Error("unauthorized");
  if (!res.ok) throw new Error("http " + res.status);
  return res.status === 204 ? null : res.json();
}

// ---------------------------------------------------------------- helpers
function ago(ts) {
  if (!ts) return "never";
  const s = Math.max(0, Math.floor((Date.now() - ts) / 1000));
  if (s < 10) return "just now";
  if (s < 60) return s + "s ago";
  const m = Math.floor(s / 60);
  if (m < 60) return m + "m ago";
  const h = Math.floor(m / 60);
  return h < 24 ? h + "h ago" : Math.floor(h / 24) + "d ago";
}
const online = (p) => Date.now() - (p.lastSeen || 0) <= 120000;
function initials(name) {
  const t = String(name || "?").trim();
  const parts = t.split(/\s+/).filter(Boolean);
  return (parts.length >= 2 ? parts[0][0] + parts[1][0] : t.slice(0, 2)).toUpperCase();
}
function hueClass(key) {
  let h = 0;
  for (const ch of key) h = (ch.charCodeAt(0) + ((h << 5) - h)) | 0;
  return "av-" + ((Math.abs(h) % 6) + 1);
}
function toast(text) {
  const el = $("toast");
  el.textContent = text;
  el.classList.add("show");
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove("show"), 2200);
}

// ---------------------------------------------------------------- views
function show(view) {
  for (const id of ["signin", "roster", "chat"]) $(id).hidden = id !== view;
}

// ---------------------------------------------------------------- roster
function renderRoster() {
  const list = peers
    .filter((p) => p.peerId !== store.peerId)
    .sort((a, b) => (online(b) - online(a)) || (b.lastSeen || 0) - (a.lastSeen || 0));
  const box = $("peer-list");
  if (!list.length) {
    box.innerHTML = '<div class="empty-list">No one on the team roster yet.<br/>Desks and phones appear here as they join.</div>';
    return;
  }
  box.innerHTML = list.map((p) => {
    const n = unread.get(p.peerId) || 0;
    return `<button class="row" data-open="${esc(p.peerId)}">
      <span class="avatar ${hueClass(p.peerId)}">${p.kind === "agent" ? "🤖" : esc(initials(p.name))}</span>
      <span class="mid">
        <span class="name">${esc(p.name || p.ip)}<span class="dot${online(p) ? " online" : ""}"></span>${p.kind === "agent" ? '<span class="badge">AI</span>' : ""}</span>
        <span class="sub">${online(p) ? "online" : esc(ago(p.lastSeen))}</span>
      </span>
      ${n ? `<span class="unread">${n}</span>` : ""}
      <span class="ping-btn" data-ping="${esc(p.peerId)}">Ping</span>
    </button>`;
  }).join("");
}

function renderHeader() {
  $("self-name").textContent = store.name;
  $("conn-dot").className = "conn" + (wsUp ? " up" : "");
  $("self-sub").textContent = wsUp ? "connected · pingable" : "reconnecting…";
}

// ---------------------------------------------------------------- chat
function renderThread() {
  const peer = peers.find((p) => p.peerId === currentChat);
  $("chat-name").textContent = peer?.name || "Chat";
  $("chat-sub").textContent = peer && online(peer) ? "online" : peer ? ago(peer.lastSeen) : "";
  const msgs = threads.get(currentChat) || [];
  $("thread").innerHTML = msgs.map((m) => `
    <div class="bubble${m.mine ? " mine" : ""}">${esc(m.message)}
      <div class="meta">${m.mine ? (m.delivered ? "✓✓ delivered" : "✓ sent") : esc(ago(m.timestamp))}</div>
    </div>`).join("");
  $("thread").scrollTop = $("thread").scrollHeight;
}

function openChat(peerId) {
  currentChat = peerId;
  unread.delete(peerId);
  renderRoster();
  renderThread();
  show("chat");
}

// ---------------------------------------------------------------- relay
function relaySend(to, channel, payload) {
  if (!ws || ws.readyState !== 1) return false;
  ws.send(JSON.stringify({ to, channel, payload }));
  return true;
}

function sendPing(peerId) {
  const ok = relaySend(peerId, "ping", {
    from: store.name, fromIp: myAddr(), fromPeerId: store.peerId,
    message: "", sound: "chime", shape: "circle", timestamp: Date.now(),
  });
  buzz(30);
  toast(ok ? "Ping sent" : "Not connected — try again in a second");
}

function sendChat() {
  const input = $("chat-input");
  const message = input.value.trim();
  if (!message || !currentChat) return;
  input.value = "";
  const payload = {
    id: crypto.randomUUID(), kind: "private",
    from: store.name, fromIp: myAddr(), fromPeerId: store.peerId,
    toIp: "", message, timestamp: Date.now(),
  };
  const ok = relaySend(currentChat, "chat", payload);
  if (!ok) { toast("Not connected"); return; }
  const list = threads.get(currentChat) || [];
  list.push({ mine: true, message, timestamp: payload.timestamp, id: payload.id, delivered: false });
  threads.set(currentChat, list);
  sounds.tap();
  renderThread();
}

function showFlash(from, message) {
  const flash = $("flash");
  flash.querySelector(".from").textContent = from || "Ping!";
  flash.querySelector(".msg").textContent = message || "is pinging you";
  flash.hidden = false;
  // restart the CSS animations
  for (const el of flash.querySelectorAll(".edge, .card")) {
    el.style.animation = "none"; void el.offsetWidth; el.style.animation = "";
  }
  sounds.chime();
  buzz([120, 60, 120]);
  clearTimeout(flash._t);
  flash._t = setTimeout(() => { flash.hidden = true; }, 1700);
}

function handleFrame(text) {
  let frame;
  try { frame = JSON.parse(text); } catch { return; }
  const p = frame.payload || {};

  if (frame.channel === "ping") {
    showFlash(p.from, p.message);
    return;
  }
  if (frame.channel !== "chat") return;

  if (p.kind === "ack") {
    for (const msgs of threads.values()) {
      const m = msgs.find((m) => m.mine && m.id === p.id && !m.delivered);
      if (m) { m.delivered = true; break; }
    }
    if (!$("chat").hidden) renderThread();
    return;
  }
  if (p.kind === "private") {
    const from = p.fromPeerId;
    if (!from) return;
    // ack first — delivery states stay honest even if rendering fails
    if (p.id) {
      relaySend(from, "chat", {
        id: p.id, kind: "ack", from: store.name, fromIp: myAddr(),
        fromPeerId: store.peerId, toIp: p.fromIp || "", message: "", timestamp: Date.now(),
      });
    }
    const list = threads.get(from) || [];
    list.push({ mine: false, message: p.message || "", timestamp: p.timestamp || Date.now() });
    threads.set(from, list);
    if (currentChat === from && !$("chat").hidden) {
      renderThread();
    } else {
      unread.set(from, (unread.get(from) || 0) + 1);
      renderRoster();
      toast((p.from || "Someone") + ": " + (p.message || ""));
    }
    sounds.bubble();
    buzz(40);
  }
}

function connectWs() {
  if (!store.token) return;
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/v1/ws?token=${encodeURIComponent(store.token)}`);
  ws.onopen = () => { wsUp = true; renderHeader(); };
  ws.onmessage = (e) => handleFrame(e.data);
  ws.onclose = () => {
    wsUp = false; renderHeader();
    if (store.token) setTimeout(connectWs, 4000);
  };
  ws.onerror = () => ws.close();
}

// ---------------------------------------------------------------- session
async function registerSelf() {
  await api("/v1/register", {
    method: "POST",
    body: JSON.stringify({
      peerId: store.peerId, name: store.name, kind: "human",
      ip: myAddr(), port: 0,
    }),
  });
}

async function refreshRoster() {
  const res = await api("/v1/peers");
  peers = res.peers || [];
  renderRoster();
  if (!$("chat").hidden) renderThread();
}

async function startSession() {
  renderHeader();
  show("roster");
  try {
    await registerSelf();
    await refreshRoster();
  } catch (err) {
    if (String(err.message) === "unauthorized") { signOut("Session expired — join again."); return; }
  }
  connectWs();
  timers.push(setInterval(() => registerSelf().catch(() => {}), 25000));
  timers.push(setInterval(() => refreshRoster().catch(() => {}), 10000));
}

function signOut(message) {
  store.token = "";
  timers.forEach(clearInterval); timers = [];
  try { ws?.close(); } catch {}
  ws = null; wsUp = false;
  $("signin-error").textContent = message || "";
  show("signin");
}

async function join() {
  const name = $("in-name").value.trim();
  const key = $("in-key").value.trim();
  if (!name || !key) { $("signin-error").textContent = "Name and team key, please."; return; }
  store.name = name;
  try {
    const res = await api("/v1/enroll", {
      method: "POST", key,
      body: JSON.stringify({ peerId: store.peerId, name }),
    });
    store.token = res.deviceToken;
  } catch (err) {
    $("signin-error").textContent =
      String(err.message) === "unauthorized" ? "That team key was not accepted." : "Can't reach the server.";
    return;
  }
  $("in-key").value = "";
  startSession();
}

// ---------------------------------------------------------------- wiring
$("in-go").addEventListener("click", join);
$("in-key").addEventListener("keydown", (e) => { if (e.key === "Enter") join(); });
$("signout").addEventListener("click", () => signOut());
$("chat-back").addEventListener("click", () => { currentChat = null; renderRoster(); show("roster"); });
$("chat-send").addEventListener("click", sendChat);
$("chat-input").addEventListener("keydown", (e) => { if (e.key === "Enter") sendChat(); });
$("peer-list").addEventListener("click", (e) => {
  const ping = e.target.closest("[data-ping]");
  if (ping) { e.stopPropagation(); sendPing(ping.dataset.ping); return; }
  const open = e.target.closest("[data-open]");
  if (open) openChat(open.dataset.open);
});

if ("serviceWorker" in navigator) navigator.serviceWorker.register("/go/sw.js").catch(() => {});

if (store.token && store.name) {
  $("in-name").value = store.name;
  startSession();
} else {
  $("in-name").value = store.name;
  show("signin");
}
</script>
</body>
</html>
