<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Welcome to Pings</title>
    <link rel="stylesheet" href="./onboarding.css" />
</head>
<body>
    <div class="onboarding-container">
        <div class="logo">
            <div class="logo-icon">🔔</div>
            <h1>Pings</h1>
        </div>
        
        <p class="tagline">Get your colleagues' attention</p>
        
        <div class="form-section">
            <label>Your Name</label>
            <input type="text" id="display-name" placeholder="Enter your name..." maxlength="20" autocomplete="off">
        </div>
        
        <div class="form-section">
            <label>Your Color</label>
            <div class="color-picker">
                <button class="color-btn selected" data-color="linear-gradient(135deg, #667eea 0%, #764ba2 100%)" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%)"></button>
                <button class="color-btn" data-color="linear-gradient(135deg, #f093fb 0%, #f5576c 100%)" style="background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%)"></button>
                <button class="color-btn" data-color="linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)" style="background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)"></button>
                <button class="color-btn" data-color="linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)" style="background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)"></button>
                <button class="color-btn" data-color="linear-gradient(135deg, #fa709a 0%, #fee140 100%)" style="background: linear-gradient(135deg, #fa709a 0%, #fee140 100%)"></button>
                <button class="color-btn" data-color="linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)" style="background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%)"></button>
            </div>
        </div>

        <div class="form-section">
            <label>Your Ping Sound</label>
            <select id="ping-sound" class="sound-select">
                <option value="chime">✨ Chime (default)</option>
                <option value="bubble">💧 Bubble</option>
                <option value="tap">👆 Tap</option>
                <option value="bell">🔔 Bell</option>
                <option value="drop">💎 Drop</option>
            </select>
        </div>
        
        <div class="form-section">
            <label>Preview</label>
            <div class="preview">
                <div class="avatar-preview" id="avatar-preview">A</div>
                <div class="preview-info">
                    <span class="name-preview" id="name-preview">Your Name</span>
                    <span class="sound-preview" id="sound-preview">✨ Chime</span>
                </div>
            </div>
        </div>
        
        <button id="get-started" class="get-started-btn">Get Started</button>
        
        <p class="privacy-note">🔒 Stays on your local network</p>
    </div>
    <script type="module" src="./onboarding.js"></script>
</body>
</html>
