<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Pings Dashboard</title>
    <link rel="stylesheet" href="./dashboard.css" />
</head>
<body>
    <div class="container">
        <header>
            <h1>Pings</h1>
            <p class="subtitle">Get someone's attention</p>
        </header>

        <section class="profile-bar">
            <div class="profile-info">
                <div class="profile-avatar" id="profile-avatar">?</div>
                <button id="upload-avatar-btn" class="avatar-btn">Photo</button>
                <input type="file" id="avatar-upload" accept="image/*" hidden />
                <input type="text" id="profile-name" class="profile-name-input" placeholder="Your name" maxlength="20" />
            </div>
            <button id="save-profile" class="save-btn">Save</button>
        </section>

        <main>
            <div class="left-panel">
                <div class="tabs">
                    <button class="tab active" data-tab="peers">Peers</button>
                    <button class="tab" data-tab="chat">Chat</button>
                    <button class="tab" data-tab="history">History</button>
                </div>
                
                <section class="tab-content active" id="peers-tab">
                    <div id="peers-container" class="scroll-area">
                        <p class="empty-state">Looking for peers...</p>
                    </div>
                </section>
                
                <section class="tab-content" id="chat-tab">
                    <div class="chat-header">
                        <h3>Team Chat</h3>
                        <span class="chat-status" id="chat-status">Connecting...</span>
                    </div>
                    <div class="chat-messages" id="chat-messages">
                        <p class="empty-state">No messages yet...</p>
                    </div>
                    <div class="quick-replies" id="quick-replies"></div>
                    <div class="quick-reply-editor">
                        <input type="text" id="quick-reply-input" placeholder="Add quick reply..." maxlength="40" />
                        <button id="add-quick-reply" class="mini-btn">Add</button>
                    </div>
                    <div class="chat-input-container">
                        <input type="text" id="chat-input" placeholder="Type..." maxlength="500">
                        <button id="send-chat" class="send-btn">Send</button>
                    </div>
                    <div class="typing-indicator" id="typing-indicator"></div>
                </section>
                
                <section class="tab-content" id="history-tab">
                    <div class="history-header">
                        <button id="clear-history" class="clear-btn">Clear</button>
                    </div>
                    <div id="history-container" class="scroll-area">
                        <p class="empty-state">No recent pings...</p>
                    </div>
                </section>
            </div>

            <aside class="settings-panel">
                <h2>Settings</h2>
                <div class="setting-group">
                    <label class="toggle-label">
                        <span>Do Not Disturb</span>
                        <input type="checkbox" id="dnd-toggle" class="toggle-input">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
                <div class="setting-group">
                    <label>Ping Shape</label>
                    <select id="ping-shape" class="sound-picker">
                        <option value="circle">⭕ Circle</option>
                        <option value="square">⬜ Square</option>
                        <option value="diamond">🔶 Diamond</option>
                        <option value="border">🔲 Border</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Position</label>
                    <div class="radio-group">
                        <label><input type="radio" name="position" value="top-left"> Top Left</label>
                        <label><input type="radio" name="position" value="top-right" checked> Top Right</label>
                        <label><input type="radio" name="position" value="center"> Center</label>
                    </div>
                </div>
                <div class="setting-group">
                    <label>Preferred Interface/IP</label>
                    <select id="preferred-ip" class="sound-picker">
                        <option value="">Auto (Best LAN IP)</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Discovery Node (optional)</label>
                    <input type="text" id="discovery-node-ip" class="message-input" placeholder="e.g., 192.168.1.42" maxlength="64">
                </div>
                <div class="setting-group">
                    <label>My Sound</label>
                    <select id="sound-picker" class="sound-picker">
                        <option value="chime">✨ Chime</option>
                        <option value="bubble">💧 Bubble</option>
                        <option value="tap">👆 Tap</option>
                        <option value="bell">🔔 Bell</option>
                        <option value="drop">💎 Drop</option>
                        <option value="off">🔇 Off</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Status</label>
                    <select id="status-select" class="sound-picker">
                        <option value="online">Online</option>
                        <option value="away">Away</option>
                        <option value="busy">Busy</option>
                    </select>
                </div>
                <div class="setting-group">
                    <label>Message</label>
                    <input type="text" id="custom-message" class="message-input" placeholder="e.g., Meeting in 5" maxlength="50">
                </div>
            </aside>
        </main>

        <footer>
            <div id="network-info" class="network-info">Detecting network...</div>
            <pre id="network-debug" class="network-debug">Diagnostics waiting...</pre>
        </footer>
    </div>
    <script type="module" src="./dashboard.js"></script>
</body>
</html>
