<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pings</title>
    <script type="module" src="/main.js" defer></script>
  </head>

  <body>
    <main class="app">
      <!-- You -->
      <header class="self-row">
        <span class="avatar" id="self-avatar">··</span>
        <div class="who">
          <div class="name" id="self-name">Pings<span class="dot online"></span></div>
          <div class="sub" id="self-sub">Checking network…</div>
        </div>
        <button class="icon-btn" id="open-options" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
        </button>
      </header>

      <!-- ⌘K quick-ping / filter -->
      <div class="finder">
        <span class="finder-glyph">›</span>
        <input id="finder-input" type="text" placeholder="Ping someone…" autocomplete="off" spellcheck="false" />
        <span class="kbd" id="finder-kbd">⌘K</span>
      </div>

      <div class="section-label"><span id="peers-count-label">On your network</span></div>

      <div id="peer-list" class="peer-list" role="list">
        <div class="empty-state" id="peer-empty">Waiting for people on your network…</div>
      </div>

      <footer class="app-footer">
        <span id="pings-today">0 pings today</span>
        <div class="footer-actions">
          <button class="link-btn" id="open-team">Team</button>
          <button class="link-btn" id="open-activity">Activity ▸</button>
        </div>
      </footer>
    </main>

    <!-- First-run onboarding -->
    <div class="onboard" id="onboard" hidden>
      <div class="onboard-card">
        <div class="onboard-mark" id="onboard-preview"><span class="onboard-ping"></span>Pings</div>
        <h1>Welcome to Pings</h1>
        <p>A tap on the shoulder for everyone on your network. First, what should people call you?</p>
        <label class="onboard-label" for="onboard-name">Your name</label>
        <input id="onboard-name" type="text" placeholder="e.g. Zach" autocomplete="off" />
        <button class="onboard-try" id="onboard-try">Preview a ping ▸</button>
        <button class="onboard-done" id="onboard-done">Start using Pings</button>
      </div>
    </div>

    <!-- Slide-up drawer: Activity timeline + Team chat -->
    <div class="drawer-scrim" id="drawer-scrim" hidden></div>
    <section class="drawer" id="drawer" hidden aria-hidden="true">
      <div class="drawer-head">
        <div class="tabs">
          <button class="tab active" data-tab="activity">Activity</button>
          <button class="tab" data-tab="team">Team</button>
        </div>
        <button class="icon-btn" id="close-drawer" title="Close" aria-label="Close">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"></path></svg>
        </button>
      </div>

      <div class="drawer-panel active" data-panel="activity">
        <div id="activity-list" class="activity-list">
          <div class="empty-state">No activity yet</div>
        </div>
      </div>

      <div class="drawer-panel" data-panel="team">
        <div id="team-messages" class="team-messages">
          <div class="empty-state">No team messages yet</div>
        </div>
        <div class="composer">
          <input id="team-input" type="text" placeholder="Message everyone…" autocomplete="off" />
          <button id="team-send" class="btn-accent">Send</button>
        </div>
      </div>
    </section>
  </body>
</html>
