<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/options.css" />
    <title>Pings Settings</title>
    <script type="module" src="/options.js" defer></script>
  </head>
  <body>
    <main class="options-wrap">
      <header>
        <h1>Pings Settings</h1>
        <p>Choose effects, sounds, profile photo, and appearance.</p>
      </header>

      <section class="card">
        <h2>App Updates</h2>
        <button id="check-updates" type="button">Check for Updates</button>
        <p id="update-status" class="muted-note">Check manually for a newer version of Pings.</p>
      </section>

      <section class="card">
        <h2>Profile</h2>
        <div class="avatar-row">
          <img id="profile-avatar-preview" alt="Profile preview" class="avatar-preview" />
          <div class="avatar-actions">
            <label class="file-label" for="profile-avatar-input">Choose Photo</label>
            <input id="profile-avatar-input" type="file" accept="image/*" />
            <button id="clear-profile-avatar" type="button">Remove Photo</button>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Appearance</h2>
        <label class="checkbox-row"><input id="dark-mode" type="checkbox" /> Dark mode</label>
      </section>

      <section class="card">
        <h2>Ping Effects</h2>
        <label>Effect Color <input id="effect-color" type="color" /></label>
        <label>Opacity <input id="effect-opacity" type="range" min="0.15" max="1" step="0.01" /></label>
        <label>Border Thickness <input id="border-thickness" type="range" min="4" max="96" step="1" /></label>
        <label>Feather <input id="effect-feather" type="range" min="6" max="96" step="1" /></label>
        <label>Duration (ms) <input id="effect-duration-ms" type="range" min="350" max="4000" step="10" /></label>
        <label class="checkbox-row"><input id="reduce-motion" type="checkbox" /> Reduce motion</label>
      </section>

      <section class="card">
        <h2>Default Ping</h2>
        <label>Sound
          <select id="sound">
            <option value="light">Light</option>
            <option value="chime">Chime</option>
            <option value="bubble">Bubble</option>
            <option value="tap">Tap</option>
            <option value="bell">Bell</option>
            <option value="drop">Drop</option>
            <option value="off">Off</option>
          </select>
        </label>
        <label>Style
          <select id="ping-shape">
            <option value="circle">Circle</option>
            <option value="border">Border</option>
          </select>
        </label>
        <label class="checkbox-row"><input id="dnd" type="checkbox" /> Do Not Disturb</label>
      </section>

      <section class="card">
        <h2>Chat Sounds</h2>
        <label class="checkbox-row"><input id="chat-sounds-enabled" type="checkbox" /> Play chat sounds</label>
        <label>Sent message sound
          <select id="chat-send-sound">
            <option value="tap">Tap</option>
            <option value="light">Light</option>
            <option value="chime">Chime</option>
            <option value="bubble">Bubble</option>
            <option value="bell">Bell</option>
            <option value="drop">Drop</option>
            <option value="off">Off</option>
          </select>
        </label>
        <label>Received message sound
          <select id="chat-receive-sound">
            <option value="bubble">Bubble</option>
            <option value="light">Light</option>
            <option value="chime">Chime</option>
            <option value="tap">Tap</option>
            <option value="bell">Bell</option>
            <option value="drop">Drop</option>
            <option value="off">Off</option>
          </select>
        </label>
      </section>

      <pre id="status">Loading...</pre>
    </main>
  </body>
</html>
