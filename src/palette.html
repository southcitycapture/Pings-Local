<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="palette.css" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ping</title>
    <script type="module" src="/palette.js" defer></script>
  </head>
  <body>
    <main class="palette win-enter">
      <div class="palette-input">
        <span class="glyph">›</span>
        <input id="q" type="text" placeholder="Ping someone…" autocomplete="off" spellcheck="false" />
      </div>
      <div id="results" class="results"></div>
      <div class="palette-foot">
        <span><span class="kbd">↵</span> Ping</span>
        <span><span class="kbd">⌘↵</span> Message</span>
        <span><span class="kbd">esc</span> Close</span>
      </div>
    </main>
  </body>
</html>
